<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>The Architect's Pantry</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #F9F9F7;
      --ink: #1A1A1A;
      --dim-ink: #666666;
      --border: #E0E0DB;
      --accent: #1A1A1A;
      --serif: 'Playfair Display', serif;
      --sans: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); 
      color: var(--ink); 
      font-family: var(--sans); 
      line-height: 1.5; 
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .nav {
      padding: 40px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      text-align: left;
    }
    .nav-title {
      font-family: var(--serif);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--dim-ink);
    }
    .hero-text {
      font-family: var(--serif);
      font-size: 2.8rem;
      line-height: 1.1;
      margin-top: 12px;
      font-weight: 400;
    }

    /* MEAL COUNTERS */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .meal-col {
      padding: 24px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .meal-col:last-child { border-right: none; }
    .meal-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: block;
    }
    .meal-val {
      font-family: var(--serif);
      font-size: 2rem;
      display: block;
      margin: 8px 0;
    }
    .counter-btn {
      background: none;
      border: 1px solid var(--border);
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .counter-btn:active { background: var(--ink); color: white; }

    /* INVENTORY SECTION */
    .section-header {
      padding: 40px 24px 10px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.4rem;
    }
    .chip-container {
      padding: 0 24px 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .chip.selected {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
      padding-left: 24px;
    }
    .chip.selected::before {
      content: '✓';
      margin-right: 8px;
      font-size: 0.7rem;
    }

    /* EXTRAS BOX */
    .input-wrap { padding: 0 24px 100px; }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: var(--sans);
      font-size: 1rem;
      padding: 12px 0;
      outline: none;
      resize: none;
    }

    /* GENERATE BAR */
    .footer-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 20px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .gen-btn {
      background: var(--ink);
      color: white;
      padding: 16px 32px;
      border: none;
      font-family: var(--sans);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* SHEET MODAL */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .sheet {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 90vh;
      background: #FFF;
      padding: 40px 24px;
      overflow-y: auto;
      transition: transform 0.4s ease-out;
    }
    .sheet h2 { font-family: var(--serif); font-size: 2rem; margin-bottom: 20px; }
    .sheet-content { white-space: pre-wrap; font-family: var(--sans); line-height: 1.8; }

    /* LOADING ANIMATION */
    .loader {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      justify-content: center;
      align-items: center;
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="nav">
  <div class="nav-title">Inventory & Strategy</div>
  <h1 class="hero-text">The Culinary<br>Architect.</h1>
</div>

<div class="meal-grid">
  <div class="meal-col">
    <span class="meal-label">Breakfast</span>
    <button class="counter-btn" onclick="update(event, 'breakfast', -1)">-</button>
    <span class="meal-val" id="v-breakfast">0</span>
    <button class="counter-btn" onclick="update(event, 'breakfast', 1)">+</button>
  </div>
  <div class="meal-col">
    <span class="meal-label">Lunch</span>
    <button class="counter-btn" onclick="update(event, 'lunch', -1)">-</button>
    <span class="meal-val" id="v-lunch">0</span>
    <button class="counter-btn" onclick="update(event, 'lunch', 1)">+</button>
  </div>
  <div class="meal-col">
    <span class="meal-label">Dinner</span>
    <button class="counter-btn" onclick="update(event, 'dinner', -1)">-</button>
    <span class="meal-val" id="v-dinner">0</span>
    <button class="counter-btn" onclick="update(event, 'dinner', 1)">+</button>
  </div>
</div>

<div id="pantry-render"></div>

<div class="section-header">Notes & Profiles</div>
<div class="input-wrap">
  <textarea id="notes" placeholder="Miso, spicy harissa, citrus..."></textarea>
</div>

<div class="footer-bar">
  <div>
    <span style="font-size: 0.7rem; color: var(--dim-ink);">Total Meals</span><br>
    <strong id="total-count" style="font-size: 1.2rem; font-family: var(--serif);">0</strong>
  </div>
  <button class="gen-btn" onclick="generate()">Compose Plan</button>
</div>

<div class="loader" id="loader">Curating your weekly menu...</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <button onclick="closeSheet()" style="margin-bottom: 20px; background: none; border: 1px solid #000; padding: 5px 10px;">Close</button>
    <div id="recipe-out" class="sheet-content"></div>
  </div>
</div>

<script>
  const S_URL = 'https://gmxbebwnmundpuvswcku.supabase.co';
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteGJlYndubXVuZHB1dnN3Y2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODM0OTQsImV4cCI6MjA5MDc1OTQ5NH0.d8JTYA23pscN0Pt7MW4-_9LQ4XnsPv8TF9aoHoXVF3s';
  const client = supabase.createClient(S_URL, S_KEY);
  
  let meals = { breakfast: 0, lunch: 0, dinner: 0 };
  let fullList = [];

  function update(e, type, delta) {
    meals[type] = Math.max(0, meals[type] + delta);
    document.getElementById(`v-${type}`).innerText = meals[type];
    document.getElementById('total-count').innerText = meals.breakfast + meals.lunch + meals.dinner;
  }

  async function init() {
    const { data } = await client.from('inventory').select('*');
    if (data) {
      fullList = data.map(i => i.item_name);
      const container = document.getElementById('pantry-render');
      const cats = [...new Set(data.map(i => i.ingredient_category))];
      
      cats.forEach(cat => {
        const h = document.createElement('div');
        h.className = 'section-header';
        h.innerText = cat || 'Essentials';
        const chips = document.createElement('div');
        chips.className = 'chip-container';
        data.filter(i => i.ingredient_category === cat).forEach(item => {
          const c = document.createElement('div');
          c.className = 'chip';
          c.innerText = item.item_name;
          c.onclick = () => c.classList.toggle('selected');
          chips.appendChild(c);
        });
        container.appendChild(h);
        container.appendChild(chips);
      });
    }
  }

  async function generate() {
    const total = meals.breakfast + meals.lunch + meals.dinner;
    if(total === 0) return alert("Choose your meals.");
    const sel = Array.from(document.querySelectorAll('.chip.selected')).map(c => c.innerText);
    
    document.getElementById('loader').style.display = 'flex';
    
    const prompt = `Nicole's Culinary Architect. MASTER PANTRY: [${fullList.join(', ')}]. USER PRIORITY: [${sel.join(', ')}]. PLAN: ${meals.breakfast}B, ${meals.lunch}L, ${meals.dinner}D. NOTES: ${document.getElementById('notes').value}. 30g+ Protein, 500kcal max per meal. High culinary variety.`;

    try {
      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const d = await res.json();
      document.getElementById('recipe-out').innerText = d.content[0].text;
      document.getElementById('overlay').style.display = 'block';
    } catch(e) { alert("API Error."); }
    document.getElementById('loader').style.display = 'none';
  }

  function closeSheet() { document.getElementById('overlay').style.display = 'none'; }
  init();
</script>

</body>
</html>
