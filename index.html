<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NomNom Planner | Grocery Auditor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #FAF8F4; --card: #FFFFFF; --grouped: #F2EFE9; --separator: rgba(0,0,0,0.06);
      --border: rgba(0,0,0,0.08); --accent: #4A7C59; --accent-light: #EBF3EE;
      --accent-text: #2D5C3E; --text: #1C1C1E; --text3: #8E8E93; --sans: -apple-system, 'Helvetica Neue', sans-serif;
      --serif: 'Playfair Display', Georgia, serif;
    }
    html, body { min-height: 100%; background: var(--bg); font-family: var(--sans); color: var(--text); -webkit-font-smoothing: antialiased; }
    .nav-bar { display: flex; align-items: center; justify-content: center; height: 52px; background: var(--bg); position: sticky; top: 0; z-index: 50; border-bottom: 0.5px solid var(--separator); }
    .nav-title { font-size: 1.05rem; font-weight: 600; }
    .hero { padding: 20px 20px 0 20px; text-align: center; }
    .hero-emoji { font-size: 2.5rem; margin-bottom: 4px; display: block; }
    .hero h1 { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .section { margin-top: 20px; }
    .section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text3); padding: 0 20px; margin-bottom: 6px; }
    .grouped { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); }
    .grouped-row { display: flex; align-items: center; padding: 0 20px; min-height: 52px; }
    .row-emoji { font-size: 1.4rem; margin-right: 12px; width: 28px; text-align: center; }
    .row-label { flex: 1; font-size: 1.05rem; font-weight: 500; }
    .stepper { display: flex; align-items: center; background: var(--grouped); border-radius: 8px; overflow: hidden; }
    .step-btn { width: 34px; height: 32px; background: none; border: none; color: var(--accent); font-size: 1.25rem; cursor: pointer; }
    .step-val { width: 34px; text-align: center; font-size: 0.92rem; font-weight: 600; }
    .chip-section { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); padding: 14px 20px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { padding: 6px 13px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .chip.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
    .input-section { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); padding: 12px 20px; }
    textarea { width: 100%; background: var(--grouped); border: none; border-radius: 10px; padding: 10px 14px; font-family: var(--sans); font-size: 0.88rem; resize: none; outline: none; }
    .gen-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px)); background: rgba(250,248,244,0.93); backdrop-filter: blur(20px); border-top: 0.5px solid var(--separator); }
    .gen-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; }
    .loader { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(250,248,244,0.88); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; }
    .loader.show { display: flex; }
    .spin { width: 42px; height: 42px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sheet-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.35); align-items: flex-end; }
    .sheet-bg.show { display: flex; }
    .sheet { width: 100%; max-height: 85vh; background: var(--card); border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; }
    .sheet-body { overflow-y: auto; padding: 20px; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; flex: 1; color: var(--text); }
  </style>
</head>
<body>

<div class="nav-bar"><div class="nav-title">NomNom Planner</div></div>

<div style="padding-bottom: 120px;">
  <div class="hero"><span class="hero-emoji">🥗</span><h1>Your <em>Smart</em> Fridge</h1></div>

  <div class="section">
    <div class="section-label">Meals Needed</div>
    <div class="grouped">
      <div class="grouped-row">
        <div class="row-emoji">☀️</div><div class="row-label">Lunch</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeCount('lunch',-1)">−</button>
          <div class="step-val" id="cLunch">0</div>
          <button class="step-btn" onclick="changeCount('lunch',1)">+</button>
        </div>
      </div>
      <div class="grouped-row">
        <div class="row-emoji">🌙</div><div class="row-label">Dinner</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeCount('dinner',-1)">−</button>
          <div class="step-val" id="cDinner">0</div>
          <button class="step-btn" onclick="changeCount('dinner',1)">+</button>
        </div>
      </div>
      <div class="grouped-row">
        <div class="row-emoji">☕</div><div class="row-label">Breakfast</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeCount('breakfast',-1)">−</button>
          <div class="step-val" id="cBreakfast">0</div>
          <button class="step-btn" onclick="changeCount('breakfast',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div id="dynamic-inventory"></div>

  <div class="section">
    <div class="section-label">Add something new?</div>
    <div class="input-section">
      <textarea id="extras" rows="2" placeholder="e.g. want to buy salmon, need to use up kimchi..."></textarea>
    </div>
  </div>
</div>

<div class="gen-wrap"><button class="gen-btn" onclick="generate()">🍽️ Generate Plan</button></div>

<div class="loader" id="loader"><div class="spin"></div><div style="margin-top:12px">Consulting the Chef...</div></div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet"><div class="sheet-body" id="sheetText"></div><button style="padding:15px; border:none; background:var(--grouped); font-weight:600;" onclick="closeSheet()">Close</button></div>
</div>

<script>
  const SUPABASE_URL = 'https://gmxbebwnmundpuvswcku.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteGJlYndubXVuZHB1dnN3Y2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODM0OTQsImV4cCI6MjA5MDc1OTQ5NH0.d8JTYA23pscN0Pt7MW4-_9LQ4XnsPv8TF9aoHoXVF3s';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  const counts = { breakfast: 0, lunch: 0, dinner: 0 };

  function changeCount(t, d) {
    counts[t] = Math.max(0, Math.min(7, counts[t] + d));
    const id = 'c' + t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById(id).textContent = counts[t];
  }

  async function init() {
    const { data } = await supabaseClient.from('inventory').select('*');
    if (data) render(data);
  }

  function render(items) {
    const container = document.getElementById('dynamic-inventory');
    container.innerHTML = '';
    
    // Explicit sort order: Protein always first
    const categoryOrder = ['Meat & Protein', 'Dairy', 'Produce', 'Dry Goods', 'Snacks', 'Other'];
    const uniqueCats = [...new Set(items.map(i => i.ingredient_category || 'Other'))];
    
    const sortedCats = uniqueCats.sort((a, b) => {
      let ia = categoryOrder.indexOf(a);
      let ib = categoryOrder.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });

    sortedCats.forEach(cat => {
      const filtered = items.filter(i => (i.ingredient_category || 'Other') === cat);
      if (filtered.length === 0) return;
      
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `<div class="section-label">${cat}</div><div class="chip-section"><div class="chips"></div></div>`;
      
      const chips = section.querySelector('.chips');
      filtered.forEach(f => {
        const div = document.createElement('div');
        div.className = 'chip';
        div.textContent = f.item_name;
        div.onclick = () => div.classList.toggle('selected');
        chips.appendChild(div);
      });
      container.appendChild(section);
    });
  }

  async function generate() {
    const total = counts.breakfast + counts.lunch + counts.dinner;
    if (total === 0) return alert("Select at least 1 meal!");
    
    const selectedItems = Array.from(document.querySelectorAll('.chip.selected')).map(c => c.textContent);
    const extras = document.getElementById('extras').value;
    
    const prompt = `
      You are Nicole's Nutrition Auditor. 
      INVENTORY: [${selectedItems.join(', ')}]
      PLAN: ${counts.breakfast}B, ${counts.lunch}L, ${counts.dinner}D.
      NOTES: ${extras || 'None'}.

      STRICT OUTPUT PROTOCOL:
      For EVERY meal, follow this EXACT structure:
         
      ### [Meal Name]
      **Total Ingredient List:** (List every single ingredient required for this recipe)
      **Macros:** P: XXg | C: XXg | F: XXg | kcal: XXX
      **✅ IN-STOCK:** (Only items found in the INVENTORY list)
      **🛒 SHOPPING LIST:** (Items Nicole MUST buy because they aren't in the inventory list)
      **Instructions:** (Short instructions)

      CONSTRAINTS: 
      - Min 30g protein, Max 500 calories. 
      - Do not assume "pantry staples" (oil/salt) are in stock unless they are in the inventory list.
    `;

    document.getElementById('loader').classList.add('show');
    try {
      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const data = await res.json();
      const responseText = data.content ? data.content[0].text : (data.choices ? data.choices[0].message.content : "No response.");
      document.getElementById('sheetText').textContent = responseText;
      document.getElementById('sheetBg').classList.add('show');
    } catch (e) {
      alert("Error reaching AI.");
    } finally {
      document.getElementById('loader').classList.remove('show');
    }
  }

  function closeSheet() { document.getElementById('sheetBg').classList.remove('show'); }
  init();
</script>
</body>
</html>
