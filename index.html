<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#FAF8F4"/>
  <title>Meal Planner | Phase 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #FAF8F4; --card: #FFFFFF; --grouped: #F2EFE9; --separator: rgba(0,0,0,0.06);
      --border: rgba(0,0,0,0.08); --accent: #4A7C59; --accent-light: #EBF3EE;
      --accent-text: #2D5C3E; --warm: #C4874A; --warm-light: #FBF0E6;
      --text: #1C1C1E; --text2: #3C3C43; --text3: #8E8E93; --text4: #AEAEB2;
      --red: #FF3B30; --sans: -apple-system, 'Helvetica Neue', sans-serif;
      --serif: 'Playfair Display', Georgia, serif;
    }
    html, body { min-height: 100%; background: var(--bg); font-family: var(--sans); color: var(--text); -webkit-font-smoothing: antialiased; }
    .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; background: var(--bg); position: sticky; top: 0; z-index: 50; }
    .nav-bar::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 0.5px; background: var(--separator); }
    .nav-title { font-size: 1.05rem; font-weight: 600; }
    .nav-sub { font-size: 0.68rem; color: var(--text3); text-align: center; }
    .hero { padding: 20px 20px 12px; text-align: center; }
    .hero-emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
    .hero h1 { font-family: var(--serif); font-size: 1.65rem; font-weight: 400; line-height: 1.2; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .section { margin-top: 24px; }
    .section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text3); padding: 0 20px; margin-bottom: 6px; }
    .grouped { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); }
    .grouped-row { display: flex; align-items: center; padding: 0 20px; min-height: 52px; position: relative; }
    .row-emoji { font-size: 1.4rem; margin-right: 12px; width: 28px; text-align: center; }
    .row-label { flex: 1; font-size: 1.05rem; font-weight: 500; }
    .stepper { display: flex; align-items: center; background: var(--grouped); border-radius: 8px; overflow: hidden; }
    .step-btn { width: 34px; height: 32px; background: none; border: none; color: var(--accent); font-size: 1.25rem; cursor: pointer; }
    .step-val { width: 34px; text-align: center; font-size: 0.92rem; font-weight: 600; }
    .chip-section { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); padding: 14px 20px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { padding: 6px 13px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg); font-size: 0.82rem; font-weight: 500; }
    .chip.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
    .input-section { background: var(--card); border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator); padding: 12px 20px; }
    textarea { width: 100%; background: var(--grouped); border: none; border-radius: 10px; padding: 10px 14px; font-family: var(--sans); font-size: 0.88rem; resize: none; outline: none; }
    .gen-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px)); background: rgba(250,248,244,0.93); backdrop-filter: blur(20px); border-top: 0.5px solid var(--separator); }
    .gen-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; }
    .loader { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(250,248,244,0.88); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .loader.show { display: flex; }
    .spin { width: 42px; height: 42px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sheet-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.35); align-items: flex-end; }
    .sheet-bg.show { display: flex; }
    .sheet { width: 100%; max-height: 92vh; background: var(--card); border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-body { overflow-y: auto; padding: 16px 20px 32px; flex: 1; white-space: pre-wrap; font-size: 0.87rem; line-height: 1.75; }
  </style>
</head>
<body>

<div class="nav-bar">
  <div style="width:50px"></div>
  <div style="text-align:center;">
    <div class="nav-title">NomNom Planner</div>
    <div class="nav-sub">Supabase Integrated</div>
  </div>
  <div style="width:50px"></div>
</div>

<div style="padding-bottom: 110px;">
  <div class="hero">
    <span class="hero-emoji">🥗</span>
    <h1>Your <em>Smart</em> Fridge</h1>
    <p>Everything listed below is pulled from your Supabase inventory.</p>
  </div>

  <div class="section">
    <div class="section-label">Meals Needed</div>
    <div class="grouped">
      <div class="grouped-row">
        <div class="row-emoji">☀️</div><div class="row-label">Lunch</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeCount('lunch',-1)">−</button>
          <div class="step-val" id="cLunch">0</div>
          <button class="step-btn" onclick="changeCount('lunch',1)">+</button>
        </div>
      </div>
      <div class="grouped-row">
        <div class="row-emoji">🌙</div><div class="row-label">Dinner</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeCount('dinner',-1)">−</button>
          <div class="step-val" id="cDinner">0</div>
          <button class="step-btn" onclick="changeCount('dinner',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div id="dynamic-inventory">
    <div class="loader-txt" style="text-align:center; padding: 20px; color: var(--text3);">Syncing with Supabase...</div>
  </div>

  <div class="section">
    <div class="section-label">Add something new?</div>
    <div class="input-section">
      <textarea id="extras" rows="2" placeholder="e.g. want to buy salmon, need to use up kimchi..."></textarea>
    </div>
  </div>
</div>

<div class="gen-wrap">
  <button class="gen-btn" id="genBtn" onclick="generate()">🍽️ Generate Plan</button>
</div>

<div class="loader" id="loader"><div class="spin"></div><div class="loader-txt">Consulting the Chef...</div></div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="sheet-body" id="sheetText"></div>
    <button style="padding: 15px; background: var(--grouped); border:none;" onclick="closeSheet()">Close</button>
  </div>
</div>

<script>
  // --- CONFIG ---
  const SUPABASE_URL = 'https://gmxbebwnmundpuvswcku.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteGJlYndubXVuZHB1dnN3Y2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODM0OTQsImV4cCI6MjA5MDc1OTQ5NH0.d8JTYA23pscN0Pt7MW4-_9LQ4XnsPv8TF9aoHoXVF3s';
  
  // FIXED LINE: Removed 'exports.' for browser compatibility
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const counts = { lunch: 0, dinner: 0 };
  let currentInventory = [];

  function changeCount(type, d) {
    counts[type] = Math.max(0, Math.min(7, counts[type] + d));
    document.getElementById(type === 'lunch' ? 'cLunch' : 'cDinner').textContent = counts[type];
  }

  // --- PHASE 1: LOAD FROM SUPABASE ---
  async function init() {
    const { data, error } = await supabaseClient.from('inventory').select('*');
    if (error) {
      console.error("Supabase Error:", error);
      document.getElementById('dynamic-inventory').innerHTML = `<p style="text-align:center; color:red;">Failed to load inventory.</p>`;
      return;
    }
    currentInventory = data;
    renderInventory(data);
  }

  function renderInventory(items) {
  const container = document.getElementById('dynamic-inventory');
  container.innerHTML = '';

  // Define your preferred order here
  const preferredOrder = ['Dairy', 'Meat', 'Snacks', 'Dry Goods', 'Produce'];
  
  // Get any other categories that might exist but aren't in our list
  const existingCats = [...new Set(items.map(i => i.category))];
  const allCategories = [...preferredOrder, ...existingCats.filter(c => !preferredOrder.includes(c))];

  allCategories.forEach(cat => {
    const catItems = items.filter(i => i.category === cat);
    if (catItems.length === 0) return; // Skip empty categories

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-label">${cat}</div>
      <div class="chip-section"><div class="chips" id="cat-${cat}"></div></div>
    `;
    container.appendChild(section);

    const chipBox = document.getElementById(`cat-${cat}`);
    catItems.forEach(item => {
      const chip = document.createElement('div');
      // Adding a toggle feature so you can "deselect" items you don't want in the prompt
      chip.className = 'chip selected'; 
      chip.onclick = () => chip.classList.toggle('selected');
      chip.textContent = item.item_name;
      chipBox.appendChild(chip);
    });
  });
}

  async function generate() {
    const total = counts.lunch + counts.dinner;
    if (total === 0) return alert("Select at least 1 meal!");

    const inventoryText = currentInventory.map(i => i.item_name).join(', ');
    const prompt = `Nicole has: ${inventoryText}. Extras: ${document.getElementById('extras').value}. Generate ${total} high-protein recipes.`;

    document.getElementById('loader').classList.add('show');
    
    try {
      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const data = await res.json();
      document.getElementById('sheetText').textContent = data.content[0].text;
      document.getElementById('sheetBg').classList.add('show');
    } catch (e) {
      alert("Error calling API: " + e.message);
    } finally {
      document.getElementById('loader').classList.remove('show');
    }
  }

  function closeSheet() { document.getElementById('sheetBg').classList.remove('show'); }

  init();
</script>
</body>
</html>
