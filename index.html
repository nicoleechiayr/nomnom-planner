<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NomNom | Glass Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.7);
      --accent: #FFD700; /* Gold accent for interactive bits */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: linear-gradient(135deg, #4A7C59 0%, #2D5C3E 50%, #1A3C2A 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .header {
      padding: 40px 24px;
      text-align: center;
    }
    .header h1 {
      font-weight: 600;
      letter-spacing: -0.02em;
      font-size: 2rem;
    }
    .header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }

    /* GLASS CARD CONTAINER */
    .container { padding: 0 20px 120px; }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
    }

    /* COUNTERS */
    .counter-grid { display: flex; justify-content: space-between; gap: 10px; }
    .counter-box { flex: 1; text-align: center; }
    .count-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; color: var(--text-dim); }
    .count-controls { display: flex; align-items: center; justify-content: center; margin-top: 10px; }
    .count-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 1.2rem;
    }
    .count-val { width: 30px; font-size: 1.2rem; font-weight: 600; }

    /* CHIPS */
    .section-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; color: var(--text-dim); }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .chip.selected {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
      transform: scale(1.05);
    }

    /* INPUT */
    textarea {
      width: 100%; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 12px; color: #fff; font-family: inherit; outline: none;
    }

    /* ACTION BAR */
    .action-bar {
      position: fixed; bottom: 20px; left: 20px; right: 20px;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .gen-btn {
      background: #fff; color: #1A3C2A; border: none; padding: 12px 24px;
      border-radius: 14px; font-weight: 600; cursor: pointer;
    }

    /* MODAL */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 1000; backdrop-filter: blur(10px); padding: 40px 20px;
    }
    .modal-body {
      background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
      border-radius: 30px; height: 100%; overflow-y: auto; padding: 30px; color: #fff;
    }

    .loader {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
      align-items: center; justify-content: center; flex-direction: column;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>NomNom</h1>
  <p>Culinary Architect v3.0</p>
</div>

<div class="container">
  <div class="glass-card counter-grid">
    <div class="counter-box">
      <span class="count-label">Breakfast</span>
      <div class="count-controls">
        <button class="count-btn" onclick="adj('breakfast', -1)">-</button>
        <span class="count-val" id="v-breakfast">0</span>
        <button class="count-btn" onclick="adj('breakfast', 1)">+</button>
      </div>
    </div>
    <div class="counter-box">
      <span class="count-label">Lunch</span>
      <div class="count-controls">
        <button class="count-btn" onclick="adj('lunch', -1)">-</button>
        <span class="count-val" id="v-lunch">0</span>
        <button class="count-btn" onclick="adj('lunch', 1)">+</button>
      </div>
    </div>
    <div class="counter-box">
      <span class="count-label">Dinner</span>
      <div class="count-controls">
        <button class="count-btn" onclick="adj('dinner', -1)">-</button>
        <span class="count-val" id="v-dinner">0</span>
        <button class="count-btn" onclick="adj('dinner', 1)">+</button>
      </div>
    </div>
  </div>

  <div id="pantry-mount"></div>

  <div class="glass-card">
    <div class="section-title">Flavor Profile</div>
    <textarea id="notes" placeholder="e.g. Smoky chipotle, umami miso..."></textarea>
  </div>
</div>

<div class="action-bar">
  <div><small style="color:var(--text-dim)">Total</small><br><strong id="tot">0</strong> Meals</div>
  <button class="gen-btn" onclick="generate()">Compose</button>
</div>

<div class="loader" id="loader"><div class="count-val">Mixing...</div></div>

<div class="modal" id="modal">
  <div class="modal-body">
    <button onclick="closeModal()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:10px; margin-bottom:20px;">Close</button>
    <div id="result" style="white-space: pre-wrap; line-height:1.6"></div>
  </div>
</div>

<script>
  const S_URL = 'https://gmxbebwnmundpuvswcku.supabase.co';
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteGJlYndubXVuZHB1dnN3Y2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODM0OTQsImV4cCI6MjA5MDc1OTQ5NH0.d8JTYA23pscN0Pt7MW4-_9LQ4XnsPv8TF9aoHoXVF3s';
  const client = supabase.createClient(S_URL, S_KEY);

  let counts = { breakfast:0, lunch:0, dinner:0 };
  let allPantry = [];

  function adj(t, d) {
    counts[t] = Math.max(0, counts[t] + d);
    document.getElementById(`v-${t}`).innerText = counts[t];
    document.getElementById('tot').innerText = counts.breakfast + counts.lunch + counts.dinner;
  }

  async function init() {
    const { data } = await client.from('inventory').select('*');
    if (data) {
      allPantry = data.map(i => i.item_name);
      const mount = document.getElementById('pantry-mount');
      const cats = [...new Set(data.map(i => i.ingredient_category))];
      
      cats.forEach(cat => {
        const wrap = document.createElement('div');
        wrap.className = 'glass-card';
        wrap.innerHTML = `<div class="section-title">${cat || 'Essentials'}</div><div class="chip-wrap"></div>`;
        const chips = wrap.querySelector('.chip-wrap');
        data.filter(i => i.ingredient_category === cat).forEach(item => {
          const c = document.createElement('div');
          c.className = 'chip';
          c.innerText = item.item_name;
          c.onclick = () => c.classList.toggle('selected');
          chips.appendChild(c);
        });
        mount.appendChild(wrap);
      });
    }
  }

  async function generate() {
    if(counts.breakfast + counts.lunch + counts.dinner === 0) return alert("Select meals.");
    const sel = Array.from(document.querySelectorAll('.chip.selected')).map(c => c.innerText);
    document.getElementById('loader').style.display = 'flex';

    const prompt = `Nicole's Culinary Architect. MASTER PANTRY: [${allPantry.join(', ')}]. USER PRIORITY: [${sel.join(', ')}]. PLAN: ${counts.breakfast}B, ${counts.lunch}L, ${counts.dinner}D. 30g+ Protein. Single serving. NO BLOAT. High culinary skill.`;

    try {
      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const d = await res.json();
      document.getElementById('result').innerText = d.content[0].text;
      document.getElementById('modal').style.display = 'block';
    } catch(e) { alert("API Error."); }
    document.getElementById('loader').style.display = 'none';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  init();
</script>
</body>
</html>
