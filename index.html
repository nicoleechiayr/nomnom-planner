<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NomNom Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #FDFCF8;
      --card: #FFFFFF;
      --accent: #4A674A;
      --accent-light: #F0F4F0;
      --text: #2C2C2C;
      --text-light: #707070;
      --border: #E2DDD2;
      --sans: 'Quicksand', sans-serif;
      --serif: 'Playfair Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.5; }

    .header { padding: 40px 24px 20px; text-align: left; }
    .header h1 { font-family: var(--serif); font-size: 2rem; color: var(--accent); }
    .header p { color: var(--text-light); font-size: 0.9rem; }

    .wrap { padding: 0 16px 140px; max-width: 600px; margin: 0 auto; }

    .card {
      background: var(--card); border-radius: 20px; padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .meal-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--accent-light);
    }
    .meal-row:last-child { border-bottom: none; }
    
    .stepper { display: flex; align-items: center; background: var(--accent-light); border-radius: 10px; padding: 4px; }
    .step-btn { width: 32px; height: 32px; border: none; background: #fff; border-radius: 6px; font-weight: bold; cursor: pointer; color: var(--accent); }
    .step-val { width: 34px; text-align: center; font-weight: 600; }

    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-light); margin-bottom: 12px; font-weight: 600; }
    .chip-flex { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 12px; background: #fff;
      border: 1px solid var(--border); font-size: 0.85rem; cursor: pointer;
    }
    .chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

    textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-family: inherit; font-size: 0.9rem; background: var(--accent-light); outline: none; resize: none; }

    .bottom-bar {
      position: fixed; bottom: 20px; left: 16px; right: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      z-index: 900;
    }
    .go-btn { background: var(--accent); color: #fff; border: none; padding: 14px 28px; border-radius: 14px; font-weight: 600; cursor: pointer; font-family: var(--sans); }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; padding: 20px; align-items: flex-end; }
    .modal { background: #fff; border-radius: 24px; width: 100%; max-height: 85vh; padding: 24px; overflow-y: auto; }

    .recipe-card {
      background: var(--accent-light); border-radius: 16px; padding: 16px;
      margin-bottom: 16px; position: relative; border: 1px solid var(--border);
    }
    .save-btn {
      position: absolute; top: 16px; right: 16px;
      background: #fff; border: 1px solid var(--accent); color: var(--accent);
      padding: 6px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.7rem;
    }
    .save-btn.saved { background: var(--accent); color: #fff; border-color: transparent; }

    .loader { display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg); align-items: center; justify-content: center; font-weight: 600; color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <h1>Planner</h1>
  <p>Strategic Meal Prep Execution</p>
</div>

<div class="wrap">
  <div class="card">
    <div class="section-title">Meal Volume</div>
    <div class="meal-row"><div><strong>Breakfast</strong></div><div class="stepper"><button class="step-btn" onclick="adj('breakfast',-1)">-</button><span class="step-val" id="v-breakfast">0</span><button class="step-btn" onclick="adj('breakfast',1)">+</button></div></div>
    <div class="meal-row"><div><strong>Lunch</strong></div><div class="stepper"><button class="step-btn" onclick="adj('lunch',-1)">-</button><span class="step-val" id="v-lunch">0</span><button class="step-btn" onclick="adj('lunch',1)">+</button></div></div>
    <div class="meal-row"><div><strong>Dinner</strong></div><div class="stepper"><button class="step-btn" onclick="adj('dinner',-1)">-</button><span class="step-val" id="v-dinner">0</span><button class="step-btn" onclick="adj('dinner',1)">+</button></div></div>
  </div>

  <div id="pantry-mount"></div>

  <div class="card">
    <div class="section-title">Flavor Constraints</div>
    <textarea id="notes" rows="2" placeholder="e.g. Miso, Harissa, Thai Basil..."></textarea>
  </div>
</div>

<div class="bottom-bar">
  <div><small>Total Plan</small><br><strong id="tot">0</strong> Meals</div>
  <button class="go-btn" onclick="generate()">Generate Plan</button>
</div>

<div class="loader" id="loader">Processing meal logic...</div>

<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="recipe-container"></div>
    <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:15px; border-radius:12px; border:none; background:var(--accent-light); color:var(--accent); font-weight:600; cursor:pointer;">Close</button>
  </div>
</div>

<script>
  const S_URL = 'https://gmxbebwnmundpuvswcku.supabase.co';
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteGJlYndubXVuZHB1dnN3Y2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODM0OTQsImV4cCI6MjA5MDc1OTQ5NH0.d8JTYA23pscN0Pt7MW4-_9LQ4XnsPv8TF9aoHoXVF3s';
  const client = supabase.createClient(S_URL, S_KEY);

  let counts = { breakfast:0, lunch:0, dinner:0 };
  let masterPantry = [];

  function adj(t, d) {
    counts[t] = Math.max(0, counts[t] + d);
    document.getElementById(`v-${t}`).innerText = counts[t];
    document.getElementById('tot').innerText = counts.breakfast + counts.lunch + counts.dinner;
  }

  async function init() {
    const { data } = await client.from('inventory').select('*');
    if (data) {
      masterPantry = data.map(i => ({ name: i.item_name, qty: i.quantity || 'unspecified' }));
      const mount = document.getElementById('pantry-mount');
      mount.innerHTML = '';
      const cats = [...new Set(data.map(i => i.ingredient_category))];
      cats.forEach(cat => {
        const wrap = document.createElement('div');
        wrap.className = 'card';
        wrap.innerHTML = `<div class="section-title">${cat || 'Pantry'}</div><div class="chip-flex"></div>`;
        const chips = wrap.querySelector('.chip-flex');
        data.filter(i => i.ingredient_category === cat).forEach(item => {
          const c = document.createElement('div');
          c.className = 'chip'; 
          c.innerText = `${item.item_name} (${item.quantity || '?'})`;
          c.onclick = () => c.classList.toggle('selected');
          chips.appendChild(c);
        });
        mount.appendChild(wrap);
      });
    }
  }

  async function generate() {
    const sel = Array.from(document.querySelectorAll('.chip.selected')).map(c => c.innerText.split(' (')[0]);
    const totalCount = counts.breakfast + counts.lunch + counts.dinner;
    if (totalCount === 0) return alert("Select meal counts first.");
    
    document.getElementById('loader').style.display = 'flex';
    const pantryContext = masterPantry.map(p => `${p.name}: ${p.qty}`).join(', ');

    const prompt = `
      System: Strategic Meal Prep Architect (Singapore/Metric).
      
      CORE STRATEGY:
      1. BATCH PREP FOCUS: Instead of unique recipes for every single slot, design 1 or 2 "Hero Recipes" that can be scaled. For example, if the user wants 4 lunches, suggest ONE high-quality recipe designed for 2 or 4 portions.
      2. CULINARY BALANCE: Use the selected ingredients [${sel.join(', ')}] as the primary anchor, but combine them with 2-3 "Market Trip" items to create a cohesive, professional-grade dish (e.g., instead of just 'Salmon and Cottage Cheese', suggest a 'Miso-Glazed Salmon with Herbed Cottage Cheese Gnocchi').
      3. LOGICAL QUANTITY: If the user has 300g salmon, do not spread it across 4 meals. Use it for 2 substantial 150g portions.
      4. TRUTH IN INGREDIENTS: Check the inventory. "Fillet" = Raw. Match cooking times (e.g. 8-10 mins for salmon fillet) exactly.
      
      CONTEXT:
      - Inventory: [${pantryContext}]
      - Priority Selections: [${sel.join(', ')}]
      - Total Prep Volume: ${counts.breakfast}B, ${counts.lunch}L, ${counts.dinner}D.
      - Flavor Notes: ${document.getElementById('notes').value || 'Creative & Gourmet'}

      OUTPUT FORMAT:
      [RECIPE]
      ## [Meal Type] Batch: [Recipe Title] (Serves X)
      *Chef's Note: Why this dish stays delicious even after 2-3 days in the fridge.*
      
      - **Macros (Per Serving):** [Metric P/C/F/kcal]
      
      ### 📋 Ingredients List (Total for the Batch)
      [Consolidated metric quantities for all portions]
      
      ### 🔍 Inventory Audit
      - **✅ FROM YOUR FRIDGE:** [Items/qty used from inventory]
      - **🛒 MARKET TRIP:** [Specific items needed to make this a 5-star prep dish]
      
      ### 🔪 Batch Prep Instructions
      [Efficient steps to cook all portions at once]
    `;

    try {
      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const d = await res.json();
      renderRecipes(d.content[0].text);
      document.getElementById('overlay').style.display = 'flex';
    } catch(e) { alert("API Error."); }
    document.getElementById('loader').style.display = 'none';
  }

      const res = await fetch('https://nomnom-api.nicoleechia.workers.dev', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      const d = await res.json();
      renderRecipes(d.content[0].text);
      document.getElementById('overlay').style.display = 'flex';
    } catch(e) { alert("API Error."); }
    document.getElementById('loader').style.display = 'none';
  }

  function renderRecipes(text) {
    const container = document.getElementById('recipe-container');
    container.innerHTML = '';
    const recipes = text.split('[RECIPE]').filter(r => r.trim().length > 10);
    
    recipes.forEach((recipeText, index) => {
      const firstLine = recipeText.trim().split('\n')[0];
      const mealName = firstLine.replace('##', '').trim();
      
      const div = document.createElement('div');
      div.className = 'recipe-card';
      div.innerHTML = `
        <button class="save-btn" id="save-${index}" onclick="saveToHistory('${index}', \`${recipeText.replace(/`/g, '\\`')}\`, '${mealName}')">Save</button>
        <div style="white-space: pre-wrap; font-size: 0.9rem;">${recipeText.trim()}</div>
      `;
      container.appendChild(div);
    });
  }

  async function saveToHistory(id, content, name) {
    const btn = document.getElementById(`save-${id}`);
    const { error } = await client.from('history').insert([{ 
      plan_text: content, 
      meal_summary: name 
    }]);

    if (!error) {
      btn.innerText = "Saved!";
      btn.classList.add('saved');
      btn.disabled = true;
    } else {
      console.error(error);
      alert("Error saving recipe.");
    }
  }

  function closeModal() { document.getElementById('overlay').style.display = 'none'; }
  init();
</script>
</body>
</html>
